<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Melissa Interface</title>
    
    <!-- Local KaTeX for 100% Offline Math Rendering -->
    <link rel="stylesheet" href="/static/katex.min.css">
    <script defer src="/static/katex.min.js"></script>
    <script defer src="/static/auto-render.min.js"></script>

    <style>
        :root {
            --bg-color: #0b0b0c;
            --card-bg: #141416;
            --text-main: #f3f4f6;
            --text-muted: #85868a;
            --brand: #34d399; /* Emerald Green */
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            border-bottom: 1px solid #1f2023;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .status {
            color: var(--brand);
            font-size: 0.85rem;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>Melissa Core</h2>
        <div class="status">● [NODE STATUS: ONLINE]</div>
    </div>
    
    <!-- Chat Interface Container -->
    <div id="chat-container">
        <!-- Messages will populate here -->
    </div>

    <script>
        // Initialize offline KaTeX rendering upon load
        document.addEventListener("DOMContentLoaded", function() {
            renderMathInElement(document.body, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false}
                ],
                throwOnError: false
            });
        });
    </script>
</body>
</html>
